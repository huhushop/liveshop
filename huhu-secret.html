<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuHuShop 秘密後台</title>
    <style>
        :root { --bg: #F5F2ED; --wood: #8D775F; --beige: #DED9D2; --text: #4F4944; }
        body { background: var(--bg); color: var(--text); font-family: "PingFang TC", sans-serif; padding: 20px; margin: 0; }
        .box { background: white; padding: 20px; border: 1px solid var(--beige); border-radius: 4px; margin-bottom: 20px; }
        h2 { font-size: 16px; color: var(--wood); border-bottom: 1px solid var(--beige); padding-bottom: 10px; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { font-size: 12px; color: var(--soft); display: block; margin-bottom: 5px; }
        input { width: 100%; border: none; border-bottom: 1px solid var(--beige); padding: 8px 0; outline: none; font-size: 15px; background: transparent; }
        .result-panel { background: #FAF9F7; padding: 15px; border-radius: 4px; margin-top: 10px; display: flex; justify-content: space-around; }
        .res-val { font-size: 18px; font-weight: bold; color: var(--wood); }
        .btn { background: var(--wood); color: white; border: none; padding: 15px; width: 100%; border-radius: 2px; cursor: pointer; font-size: 15px; }
        .btn-sec { background: #A0968E; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>☕️ HuHu 採買計算機</h2>
    <div class="box">
        <div class="calc-grid">
            <div><label>日幣原價</label><input type="number" id="jpy" value="1000" oninput="calc()"></div>
            <div><label>當前匯率</label><input type="number" id="rate" value="0.22" step="0.001" oninput="calc()"></div>
            <div><label>重量(kg)</label><input type="number" id="w" value="0.5" step="0.1" oninput="calc()"></div>
            <div><label>每kg運費</label><input type="number" id="sr" value="200" oninput="calc()"></div>
            <div><label>國內雜費</label><input type="number" id="misc" value="20" oninput="calc()"></div>
            <div><label>預計售價</label><input type="number" id="target" placeholder="輸入售價" oninput="calc()"></div>
        </div>
        <div class="result-panel">
            <div style="text-align:center"><small>成本</small><div class="res-val" id="c-cost">0</div></div>
            <div style="text-align:center"><small>利潤率</small><div class="res-val" id="c-margin">0%</div></div>
        </div>
        <button class="btn btn-sec" onclick="apply()">帶入下方上架</button>
    </div>

    <h2>📷 現場拍照上架</h2>
    <div class="box">
        <input type="file" id="f" accept="image/*" capture="camera" style="margin-bottom:10px">
        <input type="text" id="n" placeholder="品名">
        <input type="number" id="p" placeholder="台幣售價">
        <button class="btn" id="ub" onclick="upload()">確認上架</button>
    </div>

<script>
    const GAS = "https://script.google.com/macros/s/AKfycbxgMm1CI1K31VsYDvXFPNpeZ_VdRl8tr67DpZNzY7z_ZGtdxF0EQhM6gB-UdkWJxUAcYA/exec";
    function calc() {
        const j = parseFloat(document.getElementById('jpy').value)||0, r = parseFloat(document.getElementById('rate').value)||0;
        const w = parseFloat(document.getElementById('w').value)||0, s = parseFloat(document.getElementById('sr').value)||0;
        const m = parseFloat(document.getElementById('misc').value)||0, t = parseFloat(document.getElementById('target').value)||0;
        const cost = Math.ceil((j*r)+(w*s)+m);
        const margin = t > 0 ? (((t-cost)/t)*100).toFixed(1) : 0;
        document.getElementById('c-cost').innerText = `NT$ ${cost}`;
        document.getElementById('c-margin').innerText = `${margin}%`;
        return t;
    }
    function apply() { document.getElementById('p').value = document.getElementById('target').value; }
    async function upload() {
        const file = document.getElementById('f').files[0], name = document.getElementById('n').value, price = document.getElementById('p').value;
        if(!file || !name || !price) return alert('請填齊資料');
        document.getElementById('ub').innerText = "上傳中...";
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            await fetch(GAS, { method: 'POST', body: JSON.stringify({ action: 'upload', name, price, img: base64, type: file.type })});
            alert('上架成功！'); location.reload();
        };
    }
    calc();
</script>
</body>
</html>
