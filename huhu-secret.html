<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuHuShop 秘密後台</title>
    <style>
        :root { --bg: #F5F2ED; --wood: #8D775F; --beige: #DED9D2; --text: #4F4944; --accent: #C6BAAC; }
        body { background: var(--bg); color: var(--text); font-family: "PingFang TC", sans-serif; padding: 20px; margin: 0; }
        .box { background: white; padding: 20px; border: 1px solid var(--beige); border-radius: 4px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        h2 { font-size: 16px; color: var(--wood); border-bottom: 1px solid var(--beige); padding-bottom: 10px; letter-spacing: 1px; }
        
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 12px; color: var(--soft); display: block; margin-bottom: 5px; }
        input { width: 100%; border: none; border-bottom: 1px solid var(--beige); padding: 8px 0; outline: none; font-size: 15px; background: transparent; }
        
        .result-panel { background: #FAF9F7; padding: 15px; border-radius: 4px; margin-top: 10px; display: flex; justify-content: space-around; align-items: center; }
        .res-item { text-align: center; }
        .res-val { font-size: 20px; font-weight: bold; color: var(--wood); }
        .percent-tag { font-size: 12px; color: #8D775F; background: #EFEBE7; padding: 2px 8px; border-radius: 10px; margin-top: 5px; display: inline-block; }
        
        .btn { background: var(--wood); color: white; border: none; padding: 15px; width: 100%; border-radius: 2px; cursor: pointer; letter-spacing: 2px; font-size: 15px; }
        .btn-secondary { background: var(--accent); margin-top: 10px; }
    </style>
</head>
