<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuHuShop 選物連線</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg-tea: #F5F2ED; --card: #FFFFFF; --wood: #8D775F;
            --beige: #DED9D2; --text: #4F4944; --soft: #A0968E;
        }
        body { background: var(--bg-tea); color: var(--text); font-family: "PingFang TC", serif; margin: 0; padding-bottom: 90px; }
        
        /* 導覽分頁 */
        .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--beige); sticky; top: 0; z-index: 100; }
        .tab-item { flex: 1; text-align: center; padding: 15px 0; font-size: 13px; color: var(--soft); letter-spacing: 1px; cursor: pointer; }
        .tab-item.active { color: var(--wood); border-bottom: 2px solid var(--wood); font-weight: bold; }

        /* 內容區 */
        .section { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 商品卡片 */
        .product-card { background: var(--card); border: 1px solid var(--beige); border-radius: 4px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-bottom: 1px solid var(--beige); }
        .product-info { padding: 15px; }
        .price { color: var(--wood); font-weight: 500; margin: 5px 0 10px; }
        
        /* 輸入框 */
        .input-line { width: 100%; border: none; border-bottom: 1px solid var(--beige); padding: 8px 0; outline: none; background: transparent; color: var(--text); font-size: 14px; margin-bottom: 10px; }
        .btn { background: var(--wood); color: white; border: none; padding: 10px 20px; width: 100%; border-radius: 2px; letter-spacing: 1px; cursor: pointer; }

        /* 底部結帳列 */
        .footer { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); border-top: 1px solid var(--beige); padding: 15px 20px 30px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab-item active" onclick="switchTab(event, 'view-live')">現場連線</div>
        <div class="tab-item" onclick="switchTab(event, 'view-cart')">我的清單</div>
        <div class="tab-item" onclick="switchTab(event, 'view-admin')">上架管理</div>
    </div>

    <div id="view-live" class="section active">
        <div id="product-list">正在加載現場好物...</div>
    </div>

    <div id="view-cart" class="section">
        <div id="cart-container">您的清單是空的</div>
    </div>

    <div id="view-admin" class="section">
        <div style="background: white; padding: 15px; border: 1px solid var(--beige);">
            <p style="margin-top:0">📷 拍攝照片上架</p>
            <input type="file" id="up-file" accept="image/*" capture="camera" style="margin-bottom:15px">
            <input type="text" id="up-name" class="input-line" placeholder="商品品名">
            <input type="number" id="up-price" class="input-line" placeholder="價格 (NT$)">
            <button class="btn" onclick="adminUpload()">確認上架並通知群組</button>
        </div>
    </div>

    <div class="footer">
        <div>
            <small style="color:var(--soft)">預估合計</small>
            <div id="total-price" style="font-weight:bold; color:var(--wood)">NT$ 0</div>
        </div>
        <button class="btn" style="width:auto" onclick="checkout()">結算並發送</button>
    </div>

<script>
    let myCart = [];
    const CONFIG = {
        LIFF_ID: '你的_LIFF_ID',
        GAS_URL: '你的_GAS_部署網址'
    };

    // 初始化
    async function init() {
        await liff.init({ liffId: CONFIG.LIFF_ID });
        if (!liff.isLoggedIn()) liff.login();
        loadProducts();
    }
    init();

    // 切換標籤
    function switchTab(e, tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    // 抓取試算表商品
    async function loadProducts() {
        const res = await fetch(CONFIG.GAS_URL);
        const data = await res.json();
        let html = '';
        data.forEach(p => {
            html += `
                <div class="product-card">
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price">NT$ ${p
