<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuHuShop 選物</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg-milk-tea: #F5F2ED;
            --card-white: #FFFFFF;
            --accent-wood: #8D775F;
            --border-beige: #DED9D2;
            --text-main: #4F4944;
            --text-soft: #A0968E;
        }

        body {
            background-color: var(--bg-milk-tea);
            color: var(--text-main);
            font-family: "PingFang TC", serif;
            margin: 0; padding-bottom: 80px;
        }

        /* 分頁標籤欄 */
        .tabs {
            display: flex;
            background: var(--card-white);
            border-bottom: 1px solid var(--border-beige);
            position: sticky;
            top: 0; z-index: 100;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
            color: var(--text-soft);
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .tab-item.active {
            color: var(--accent-wood);
            border-bottom: 2px solid var(--accent-wood);
            font-weight: bold;
        }

        /* 內容區塊 */
        .content-section {
            display: none; /* 預設隱藏 */
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        .content-section.active {
            display: block; /* 顯示當前分頁 */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 商品卡片與備註 */
        .product-card {
            background: var(--card-white);
            border: 1px solid var(--border-beige);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .product-info { padding: 15px; }
        .note-input {
            width: 100%; border: none; border-bottom: 1px solid var(--border-beige);
            padding: 8px 0; outline: none; font-size: 13px; color: var(--text-main);
            background: transparent; margin-bottom: 10px;
        }

        /* 底部結算 */
        .footer-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px; box-sizing: border-box;
            border-top: 1px solid var(--border-beige);
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn-main {
            background: var(--accent-wood); color: white;
            border: none; padding: 10px 25px;
